name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  ci-backend:
    name: CI Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Test
        run: go test ./... -count=1

  ci-frontend:
    name: CI Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test

  validate-env:
    name: Validate Environment
    runs-on: ubuntu-latest
    steps:
      - name: Check required variables
        run: |
          missing=0
          for var in API_LAMBDA_NAME POST_CONFIRMATION_LAMBDA_NAME S3_BUCKET_NAME CLOUDFRONT_DISTRIBUTION_ID VITE_API_URL; do
            val=$(eval echo "\$${var}")
            if [ -z "$val" ]; then
              echo "::error::Missing required variable: $var"
              missing=1
            fi
          done
          [ "$missing" = "0" ] || exit 1
        env:
          API_LAMBDA_NAME: ${{ vars.API_LAMBDA_NAME }}
          POST_CONFIRMATION_LAMBDA_NAME: ${{ vars.POST_CONFIRMATION_LAMBDA_NAME }}
          S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [ci-backend, validate-env]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build API Lambda
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap cmd/api/main.go
          zip api.zip bootstrap
          rm bootstrap

      - name: Build Post Confirmation Lambda
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap cmd/postconfirmation/main.go
          zip postconfirmation.zip bootstrap
          rm bootstrap

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current function versions (for rollback)
        id: current_versions
        run: |
          API_VERSION=$(aws lambda get-function --function-name ${{ vars.API_LAMBDA_NAME }} --query 'Configuration.Version' --output text 2>/dev/null || echo "none")
          PC_VERSION=$(aws lambda get-function --function-name ${{ vars.POST_CONFIRMATION_LAMBDA_NAME }} --query 'Configuration.Version' --output text 2>/dev/null || echo "none")
          echo "api_version=$API_VERSION" >> "$GITHUB_OUTPUT"
          echo "pc_version=$PC_VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy API Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.API_LAMBDA_NAME }} \
            --zip-file fileb://api.zip

      - name: Deploy Post Confirmation Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.POST_CONFIRMATION_LAMBDA_NAME }} \
            --zip-file fileb://postconfirmation.zip

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [ci-frontend, validate-env]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }} --delete --exclude "*.woff2"
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }} --exclude "*" --include "*.woff2" \
            --content-type "font/woff2" --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Health check
        run: |
          sleep 10
          # API Gateway uses Cognito authorizer on all routes, so /api/health returns 401.
          # Verify that API Gateway is reachable (any HTTP response means the infra is up).
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.VITE_API_URL }}/api/health")
          if [ "$HTTP_CODE" = "000" ]; then
            echo "::error::Health check failed — no response from API Gateway"
            exit 1
          fi
          echo "API Gateway responded with HTTP $HTTP_CODE — infra is up"

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, smoke-test]
    if: failure()

    steps:
      - name: Report failure
        run: |
          echo "::error::Deploy failed. Check the workflow logs for details."
          echo "Deploy failed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Failed jobs" >> "$GITHUB_STEP_SUMMARY"
          echo "Check individual job logs above for error details." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Rollback" >> "$GITHUB_STEP_SUMMARY"
          echo 'To rollback backend, re-run the deploy workflow from the last successful commit using:' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo 'gh workflow run deploy.yml --ref <previous-commit-sha>' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
