# Production deployment workflow.
# For additional safety, configure GitHub Environment protection rules:
#   Settings > Environments > "production" > Required reviewers
name: Deploy (Production)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "::error::Confirmation failed. You must type 'deploy' to confirm."
          exit 1

  deploy-backend:
    name: Deploy Backend (prod)
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build API Lambda
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap cmd/api/main.go
          zip api.zip bootstrap
          rm bootstrap

      - name: Build Post Confirmation Lambda
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o bootstrap cmd/postconfirmation/main.go
          zip postconfirmation.zip bootstrap
          rm bootstrap

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current function versions (for rollback)
        id: current_versions
        run: |
          API_VERSION=$(aws lambda get-function --function-name ${{ vars.API_LAMBDA_NAME }} --query 'Configuration.Version' --output text 2>/dev/null || echo "none")
          PC_VERSION=$(aws lambda get-function --function-name ${{ vars.POST_CONFIRMATION_LAMBDA_NAME }} --query 'Configuration.Version' --output text 2>/dev/null || echo "none")
          echo "api_version=$API_VERSION" >> "$GITHUB_OUTPUT"
          echo "pc_version=$PC_VERSION" >> "$GITHUB_OUTPUT"
          # Rollback: gh workflow run deploy-prod.yml --ref <previous-commit-sha>

      - name: Deploy API Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.API_LAMBDA_NAME }} \
            --zip-file fileb://api.zip

      - name: Deploy Post Confirmation Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.POST_CONFIRMATION_LAMBDA_NAME }} \
            --zip-file fileb://postconfirmation.zip

  deploy-frontend:
    name: Deploy Frontend (prod)
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_CLOUDFRONT_URL: ${{ vars.VITE_CLOUDFRONT_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }} --delete --exclude "*.woff2"
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }} --exclude "*" --include "*.woff2" \
            --content-type "font/woff2" --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: failure()
    steps:
      - name: Report failure
        run: |
          echo "::error::Production deployment failed. Check the logs above for details."
          echo "Rollback: re-run the workflow from the last known-good commit."
